name: 3 - Previsao por Filtros (pesado, 1x ao dia)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: malha-ia-previsao-filtros
  cancel-in-progress: false

jobs:
  sincronizar_hub:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias leves
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Baixar dados publicos do hub
        run: python scripts/baixar_dados_hub.py

      - name: Exportar CSVs
        run: python scripts/exportar_dados_csv.py

      - name: Commit dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza dados de filtros do hub"
          file_pattern: dados/*.json dados_csv/*.csv
